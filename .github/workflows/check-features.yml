name: Check Features

on:
  push:
    branches:
      - main
    paths:
      - src/**/*.rs
      - Cargo.toml
  pull_request:
    branches:
      - main
    paths:
      - src/**/*.rs
      - Cargo.toml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - arrow
          - geoarrow-08
          - polars
          - polars-51
          - polars-53
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: r-lib/actions/setup-r@v2
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --no-default-features --features ${{ matrix.feature }} -- -D warnings
      - name: cargo check
        run: cargo check --no-default-features --features ${{ matrix.feature }}

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::wk
            any::geoarrow
      - name: cargo test
        run: cargo test --features geoarrow-08
